name: tet_photobooth
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  provider: ^6.0.5
  image_picker: ^1.1.0
  screenshot: ^3.0.0
  path_provider: ^2.1.3
  gal: ^2.3.0
  permission_handler: ^11.3.1
  google_fonts: ^6.2.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  assets:
    - assets/stickers/
    - assets/frames/

  uses-material-design: true
